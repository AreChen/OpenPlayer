[package]
name = "openplayer-desktop"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true

[lib]
name = "openplayer_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[features]
default = ["mpv-render"]
mpv-smoke = ["dep:libmpv2"]
mpv-embed = ["dep:libmpv2", "dep:raw-window-handle", "dep:serde", "dep:windows-sys"]
mpv-render = ["dep:libmpv2", "dep:libmpv2-sys", "dep:raw-window-handle", "dep:serde", "dep:windows-sys"]

[dependencies]
tauri = { version = "2", features = [] }
tauri-runtime = "2"
libmpv2 = { version = "6.0.0", optional = true, default-features = false }
libmpv2-sys = { version = "4.0.1", optional = true }
raw-window-handle = { version = "0.6", optional = true }
serde = { version = "1", features = ["derive"], optional = true }
tauri-plugin-dialog = "2"
windows-sys = { version = "0.60", features = [
  "Win32_Foundation",
  "Win32_Graphics_Gdi",
  "Win32_Graphics_OpenGL",
  "Win32_System_LibraryLoader",
  "Win32_UI_WindowsAndMessaging",
], optional = true }

[build-dependencies]
tauri-build = { version = "2", features = [] }
