name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows-installer:
    name: Windows installer
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Restore Windows mpv runtime
        shell: pwsh
        run: |
          $manifestPath = "docs/native-deps/mpv-windows-x64.json"
          $manifest = Get-Content -LiteralPath $manifestPath | ConvertFrom-Json
          $downloadPath = Join-Path $env:RUNNER_TEMP $manifest.asset
          $extractRoot = Join-Path $env:RUNNER_TEMP "mpv-extract"
          $targetRoot = "vendor/native/mpv/windows-x64"

          Invoke-WebRequest -Uri $manifest.url -OutFile $downloadPath
          $actualHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $downloadPath).Hash.ToLowerInvariant()
          if ($actualHash -ne $manifest.sha256) {
            throw "mpv archive hash mismatch: expected $($manifest.sha256), got $actualHash"
          }

          $sevenZip = (Get-Command 7z -ErrorAction SilentlyContinue).Source
          if (-not $sevenZip) {
            $sevenZip = (Get-Command 7z.exe -ErrorAction SilentlyContinue).Source
          }
          if (-not $sevenZip) {
            throw "7-Zip is required on the Windows runner"
          }

          New-Item -ItemType Directory -Force -Path $extractRoot, $targetRoot | Out-Null
          & $sevenZip x $downloadPath "-o$extractRoot" -y | Out-Null

          $runtimeDll = Get-ChildItem -LiteralPath $extractRoot -Recurse -Filter "libmpv-2.dll" | Select-Object -First 1
          $importLibrary = Get-ChildItem -LiteralPath $extractRoot -Recurse -Filter "libmpv.dll.a" | Select-Object -First 1
          $includeDir = Get-ChildItem -LiteralPath $extractRoot -Recurse -Directory -Filter "include" | Select-Object -First 1
          if (-not $runtimeDll -or -not $importLibrary -or -not $includeDir) {
            throw "mpv archive is missing libmpv-2.dll, libmpv.dll.a, or include"
          }

          Copy-Item -LiteralPath $runtimeDll.FullName -Destination $targetRoot -Force
          Copy-Item -LiteralPath $importLibrary.FullName -Destination $targetRoot -Force
          Copy-Item -LiteralPath $includeDir.FullName -Destination $targetRoot -Recurse -Force

      - name: Verify release metadata
        working-directory: apps/desktop
        shell: pwsh
        run: npm run verify:release -- --tag=$env:RELEASE_TAG

      - name: Verify shell architecture
        working-directory: apps/desktop
        run: npm run verify:shell

      - name: Build Windows installer
        working-directory: apps/desktop
        run: npm run tauri:build -- --config src-tauri/tauri.windows.conf.json

      - name: Prepare installer checksum
        shell: pwsh
        run: |
          $packageJson = Get-Content -LiteralPath "apps/desktop/package.json" | ConvertFrom-Json
          $installer = Resolve-Path "target/release/bundle/nsis/OpenPlayer_$($packageJson.version)_x64-setup.exe"
          $checksum = "$installer.sha256"
          $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $installer
          "$($hash.Hash)  $([System.IO.Path]::GetFileName($installer))" | Set-Content -LiteralPath $checksum -Encoding ascii
          "OPENPLAYER_INSTALLER=$installer" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "OPENPLAYER_CHECKSUM=$checksum" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Publish GitHub release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = (Get-Content -LiteralPath "apps/desktop/package.json" | ConvertFrom-Json).version
          $notesFile = "docs/releases/$env:RELEASE_TAG.md"
          if (-not (Test-Path -LiteralPath $notesFile)) {
            throw "Missing release notes file: $notesFile"
          }

          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:RELEASE_TAG --title "OpenPlayer $version" --notes-file $notesFile --target $env:GITHUB_SHA
          }

          gh release upload $env:RELEASE_TAG $env:OPENPLAYER_INSTALLER $env:OPENPLAYER_CHECKSUM --clobber

  linux-packages:
    name: Linux packages
    runs-on: ubuntu-latest
    needs: windows-installer
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libdbus-1-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libmpv-dev \
            librsvg2-dev \
            patchelf
          sudo apt-get install -y libfuse2t64 || sudo apt-get install -y libfuse2

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Verify release metadata
        working-directory: apps/desktop
        run: npm run verify:release -- --tag=$RELEASE_TAG

      - name: Verify shell architecture
        working-directory: apps/desktop
        run: npm run verify:shell

      - name: Build Linux packages
        working-directory: apps/desktop
        run: npm run tauri:build -- --config src-tauri/tauri.linux.conf.json

      - name: Prepare package checksums
        run: |
          deb="$(realpath target/release/bundle/deb/*.deb)"
          appimage="$(realpath target/release/bundle/appimage/*.AppImage)"

          sha256sum "$deb" > "$deb.sha256"
          sha256sum "$appimage" > "$appimage.sha256"

          {
            echo "OPENPLAYER_LINUX_DEB=$deb"
            echo "OPENPLAYER_LINUX_DEB_CHECKSUM=$deb.sha256"
            echo "OPENPLAYER_LINUX_APPIMAGE=$appimage"
            echo "OPENPLAYER_LINUX_APPIMAGE_CHECKSUM=$appimage.sha256"
          } >> "$GITHUB_ENV"

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "$OPENPLAYER_LINUX_DEB" \
            "$OPENPLAYER_LINUX_DEB_CHECKSUM" \
            "$OPENPLAYER_LINUX_APPIMAGE" \
            "$OPENPLAYER_LINUX_APPIMAGE_CHECKSUM" \
            --clobber

  macos-packages:
    name: macOS unsigned packages (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
          - runner: macos-15-intel
            arch: x64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS dependencies
        run: |
          brew install mpv pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix mpv)/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Verify release metadata
        working-directory: apps/desktop
        run: npm run verify:release -- --tag=$RELEASE_TAG

      - name: Verify shell architecture
        working-directory: apps/desktop
        run: npm run verify:shell

      - name: Build macOS app bundle
        working-directory: apps/desktop
        run: npm run tauri:build -- --config src-tauri/tauri.macos.conf.json --bundles app

      - name: Bundle macOS libmpv dylibs
        working-directory: apps/desktop
        run: node scripts/bundle-macos-libmpv.mjs

      - name: Verify macOS dylib references
        run: |
          app="target/release/bundle/macos/OpenPlayer.app"
          unresolved=0
          exe="$(find "$app/Contents/MacOS" -maxdepth 1 -type f | head -1)"
          if otool -L "$exe" | grep -E "/opt/homebrew|/usr/local|/Cellar"; then
            unresolved=1
          fi
          while IFS= read -r binary; do
            if otool -L "$binary" 2>/dev/null | grep -E "/opt/homebrew|/usr/local|/Cellar"; then
              echo "unrewritten dependency in $binary"
              unresolved=1
            fi
          done < <(find "$app/Contents/Frameworks" -type f \( -name "*.dylib" -o -name "*.so" -o -perm +111 \))
          exit "$unresolved"

      - name: Ad-hoc sign macOS app
        run: |
          app="target/release/bundle/macos/OpenPlayer.app"
          codesign --force --deep --sign - "$app"
          codesign --verify --deep --strict --verbose=2 "$app"

      - name: Prepare unsigned DMG checksum
        run: |
          version="$(node -e "const fs=require('fs'); console.log(JSON.parse(fs.readFileSync('apps/desktop/package.json','utf8')).version)")"
          app="$(realpath target/release/bundle/macos/OpenPlayer.app)"
          dmg_dir="target/release/bundle/dmg"
          mkdir -p "$dmg_dir"
          dmg="$PWD/$dmg_dir/OpenPlayer_${version}_${{ matrix.arch }}.dmg"
          rm -f "$dmg" "$dmg.sha256"
          hdiutil create -volname OpenPlayer -srcfolder "$app" -ov -format UDZO "$dmg"
          shasum -a 256 "$dmg" > "$dmg.sha256"

      - name: Upload unsigned macOS package artifact
        uses: actions/upload-artifact@v6
        with:
          name: openplayer-macos-${{ matrix.arch }}-unsigned
          path: |
            target/release/bundle/dmg/*.dmg
            target/release/bundle/dmg/*.sha256
